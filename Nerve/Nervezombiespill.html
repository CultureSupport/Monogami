<html>
<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valaxin Zombie Overlevelse - Norge</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            color: #ff4444;
            text-shadow: 2px 2px 4px #000;
        }
        #terminal {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 120px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #444;
            color: #0f0;
            padding: 10px;
            font-size: 12px;
            overflow-y: hidden;
            pointer-events: none;
        }
        .status-bar {
            width: 200px;
            height: 10px;
            background: #222;
            border: 1px solid #555;
            margin-top: 5px;
        }
        #health-fill { width: 100%; height: 100%; background: #f00; transition: width 0.3s; }
    </style>
</head>
<body>

<div id="ui-layer">
    <h1 class="text-2xl font-bold italic">ZONE: NORGE - VALAXIN KRISE</h1>
    <p>Zombier søker medisiner for å dempe muskelkramper...</p>
    <div class="mt-4">
        <span>VALAXIN RESERVER:</span>
        <div class="status-bar"><div id="health-fill"></div></div>
    </div>
</div>

<div id="terminal">
    <div id="logs"></div>
</div>

<script>
    let scene, camera, renderer, zombies = [], pills = [], flag;
    const clock = new THREE.Clock();
    const logContainer = document.getElementById('logs');

    function addLog(msg) {
        const div = document.createElement('div');
        div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logContainer.appendChild(div);
        if (logContainer.childNodes.length > 6) logContainer.removeChild(logContainer.firstChild);
    }

    function init() {
        // Scene Setup
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.05);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 30);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lys
        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);
        const moonLight = new THREE.DirectionalLight(0xffffff, 0.5);
        moonLight.position.set(10, 20, 10);
        scene.add(moonLight);

        // Bakken (Snødekt Norge)
        const groundGeo = new THREE.PlaneGeometry(100, 100, 32, 32);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0xeeeeff, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Enkle Fjell
        for(let i=0; i<15; i++) {
            const mGeo = new THREE.ConeGeometry(5 + Math.random()*10, 10 + Math.random()*20, 4);
            const mMat = new THREE.MeshStandardMaterial({ color: 0x222233 });
            const mountain = new THREE.Mesh(mGeo, mMat);
            mountain.position.set(Math.random()*100-50, 5, Math.random()*100-50);
            scene.add(mountain);
        }

        // Norsk Flagg
        const flagPoleGeo = new THREE.CylinderGeometry(0.1, 0.1, 15);
        const flagPoleMat = new THREE.MeshStandardMaterial({ color: 0x777777 });
        const pole = new THREE.Mesh(flagPoleGeo, flagPoleMat);
        pole.position.set(0, 7.5, 0);
        scene.add(pole);

        const flagGeo = new THREE.PlaneGeometry(4, 3);
        const flagCanvas = document.createElement('canvas');
        flagCanvas.width = 128; flagCanvas.height = 96;
        const ctx = flagCanvas.getContext('2d');
        ctx.fillStyle = '#ef2b2d'; ctx.fillRect(0,0,128,96); // Rød
        ctx.fillStyle = '#fff'; ctx.fillRect(0,36,128,24); ctx.fillRect(36,0,24,96); // Hvit
        ctx.fillStyle = '#002868'; ctx.fillRect(0,42,128,12); ctx.fillRect(42,0,12,96); // Blå
        const flagTex = new THREE.CanvasTexture(flagCanvas);
        const flagMat = new THREE.MeshBasicMaterial({ map: flagTex, side: THREE.DoubleSide });
        flag = new THREE.Mesh(flagGeo, flagMat);
        flag.position.set(2, 13, 0);
        scene.add(flag);

        // Opprett Zombier
        for(let i=0; i<8; i++) spawnZombie();
        
        // Opprett Valaxin-piller
        for(let i=0; i<10; i++) spawnPill();

        addLog("System restart: Norge lokasjon bekreftet.");
        addLog("Advarsel: Zombier i bevegelse mot Valaxin-lager.");

        animate();
    }

    function spawnZombie() {
        const group = new THREE.Group();
        // Kropp
        const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 0.5), new THREE.MeshStandardMaterial({ color: 0x224422 }));
        body.position.y = 1;
        // Hode
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({ color: 0x446644 }));
        head.position.y = 2.4;
        group.add(body, head);
        group.position.set(Math.random()*60-30, 0, Math.random()*60-30);
        scene.add(group);
        zombies.push({ mesh: group, speed: 0.02 + Math.random()*0.03 });
    }

    function spawnPill() {
        const geo = new THREE.BoxGeometry(0.8, 0.4, 0.4);
        const mat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x330000 });
        const pill = new THREE.Mesh(geo, mat);
        pill.position.set(Math.random()*40-20, 0.2, Math.random()*40-20);
        scene.add(pill);
        pills.push(pill);
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getElapsedTime();

        // Flagg-animasjon
        flag.rotation.y = Math.sin(delta * 2) * 0.1;

        // Zombie-bevegelse
        zombies.forEach(z => {
            if (pills.length > 0) {
                // Finn nærmeste pille
                let closest = pills[0];
                let minDist = z.mesh.position.distanceTo(closest.position);
                pills.forEach(p => {
                    const d = z.mesh.position.distanceTo(p.position);
                    if (d < minDist) { minDist = d; closest = p; }
                });

                // Gå mot pille
                const direction = new THREE.Vector3().subVectors(closest.position, z.mesh.position).normalize();
                z.mesh.position.addScaledVector(direction, z.speed);
                z.mesh.lookAt(closest.position.x, 0, closest.position.z);

                // Spis pille
                if (minDist < 1) {
                    scene.remove(closest);
                    pills = pills.filter(p => p !== closest);
                    addLog("Kritisk: Zombie konsumerte Valaxin ved koordinat " + Math.round(z.mesh.position.x));
                    spawnPill(); // Ny pille dukker opp
                    
                    const healthFill = document.getElementById('health-fill');
                    const currentWidth = parseFloat(healthFill.style.width || "100");
                    healthFill.style.width = (currentWidth - 5) + "%";
                }
            }
        });

        // Kamerabevegelse (sakte rotasjon)
        camera.position.x = Math.sin(delta * 0.1) * 40;
        camera.position.z = Math.cos(delta * 0.1) * 40;
        camera.lookAt(0, 5, 0);

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.onload = init;
</script>
</body>
</html>
