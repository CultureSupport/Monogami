<html>
<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psykose Distrikt</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --police-blue: #1a1a2e;
            --alert-red: #ff0033;
            --terminal-green: #00ff41;
        }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .terminal {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--terminal-green);
            color: var(--terminal-green);
            padding: 15px;
            width: 350px;
            font-size: 12px;
            pointer-events: auto;
            max-height: 400px;
            overflow-y: auto;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }

        .status-header {
            background: var(--police-blue);
            color: white;
            padding: 10px;
            border-left: 10px solid var(--alert-red);
            margin-bottom: 10px;
        }

        #timer-wrap {
            width: 100%;
            height: 20px;
            background: #222;
            border: 1px solid #444;
            position: relative;
        }
        #timer-bar {
            height: 100%;
            width: 0%;
            background: var(--alert-red);
            transition: width 0.1s linear;
        }

        .glitch-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 0, 0, 0.1);
            display: none;
            z-index: 5;
            pointer-events: none;
        }

        canvas { display: block; }

        .log-entry { margin-bottom: 8px; border-bottom: 1px dotted #333; padding-bottom: 4px; }
        .log-location { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<div class="glitch-overlay" id="glitch"></div>

<div id="ui-layer">
    <div class="terminal" id="police-log">
        <div class="status-header">
            POLITIET - DISTRIKT NORDMØRE/ROMSDAL<br>
            OPERASJON: Psykose Nettverk <br>
            STED: Glattcelle Molde 
        </div>
        <div id="log-content">
            <div class="log-entry">> Initialiserer logg...</div>
            <div class="log-entry">> Venter på biometrisk data...</div>
        </div>
    </div>

    <div>
        <div style="color: white; margin-bottom: 5px;">PSYKOTISK DEKOMPENSERING SYKLUS (12s)</div>
        <div id="timer-wrap">
            <div id="timer-bar"></div>
        </div>
    </div>
</div>

<script>
    let scene, camera, renderer, clock;
    let bodyParts = [], particles;
    let cycleTime = 0;
    let lastLogUpdate = 0;

    const locations = [
        { name: "GJEMNES", msg: "Enhet 22 pågrepet i Batnfjordsøra. Rusutløst aggresjon. Sendes til vern." },
        { name: "MOLDE", msg: "Objekt observert ved sykehuset. Farlig utagerende. Politi-eskorte nødvendig." },
        { name: "KRISTIANSUND", msg: "Razzia fullført i havna. 3 personell med akutt psykose isolert." },
        { name: "TORVIKBUKT", msg: "Melding om uro. Patrulje 09 henter objekt for pre-psykiatrisk skjerming." }
    ];

    // --- SHADERS ---
    const vShader = `
        uniform float uTime;
        uniform float uDistortion;
        varying vec3 vNormal;
        void main() {
            vNormal = normal;
            vec3 pos = position;
            if(uDistortion > 0.0) {
                float n = sin(pos.y * 20.0 + uTime * 15.0) * cos(pos.z * 15.0);
                pos += normal * n * uDistortion;
            }
            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        }
    `;

    const fShader = `
        varying vec3 vNormal;
        uniform vec3 uColor;
        void main() {
            float diff = pow(0.6 - dot(vNormal, vec3(0,0,1.0)), 2.0);
            gl_FragColor = vec4(uColor + diff, 1.0);
        }
    `;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xdddddd);
        clock = new THREE.Clock();

        camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 3);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Miljø
        const cell = new THREE.Mesh(
            new THREE.BoxGeometry(6, 4, 6),
            new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.BackSide })
        );
        cell.position.y = 2;
        scene.add(cell);

        const light = new THREE.PointLight(0xffffff, 2, 10);
        light.position.set(0, 3.5, 0);
        scene.add(light);

        // Menneskelig figur
        const mat = new THREE.ShaderMaterial({
            uniforms: { uTime: {value:0}, uDistortion: {value:0}, uColor: {value: new THREE.Color(0x333333)} },
            vertexShader: vShader, fragmentShader: fShader
        });

        const addPart = (geo, y, name) => {
            const m = new THREE.Mesh(geo, mat.clone());
            m.position.y = y;
            scene.add(m);
            bodyParts.push(m);
        };

        addPart(new THREE.SphereGeometry(0.15, 32, 32), 1.6, "hode"); // Hode
        addPart(new THREE.BoxGeometry(0.4, 0.6, 0.2, 10, 10), 1.2, "torso"); // Torso
        addPart(new THREE.BoxGeometry(0.12, 0.8, 0.12, 5, 10), 0.5, "beinL"); // Bein
        
        // Partikler
        const pGeo = new THREE.BufferGeometry();
        const pPos = new Float32Array(500 * 3);
        for(let i=0; i<1500; i++) pPos[i] = (Math.random()-0.5)*4;
        pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        particles = new THREE.Points(pGeo, new THREE.PointsMaterial({size:0.02, color:0x000000, transparent:true, opacity:0}));
        scene.add(particles);
    }

    function updateLog() {
        const logContent = document.getElementById('log-content');
        const loc = locations[Math.floor(Math.random() * locations.length)];
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.innerHTML = `[${new Date().toLocaleTimeString()}] <span class="log-location">${loc.name}:</span> ${loc.msg}`;
        logContent.prepend(div);
        if(logContent.children.length > 15) logContent.lastChild.remove();
    }

    function animate() {
        requestAnimationFrame(animate);
        const elapsed = clock.getElapsedTime();
        const delta = clock.getDelta();
        
        cycleTime = elapsed % 12;
        const progress = cycleTime / 12;
        document.getElementById('timer-bar').style.width = (progress * 100) + '%';

        let distValue = 0;
        const glitchEl = document.getElementById('glitch');

        if(cycleTime > 8) {
            // PSYKOSEN STARTER
            distValue = (cycleTime - 8) * 0.15;
            glitchEl.style.display = 'block';
            glitchEl.style.opacity = Math.random() * 0.3;
            if(Math.random() > 0.95) updateLog();
            camera.position.x = Math.sin(elapsed * 50) * 0.02;
        } else {
            distValue = 0;
            glitchEl.style.display = 'none';
            camera.position.x = 0;
        }

        bodyParts.forEach(part => {
            part.material.uniforms.uTime.value = elapsed;
            part.material.uniforms.uDistortion.value = distValue;
        });

        particles.material.opacity = distValue * 2;
        particles.rotation.y += 0.01;

        renderer.render(scene, camera);
    }

    window.onload = () => {
        init();
        animate();
        setInterval(updateLog, 4000); // Regelmessig logg-oppdatering
    };
</script>
</body>
</html>
